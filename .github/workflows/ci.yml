name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        # CI runs unit tests only (safe-config concurrency, etc.).
        # The full `npm test` includes integration tests that need a Pi
        # environment (/etc/birdnet/birdnet.conf, ALSA, populated DB) and
        # only run on bird.local / a real install.
        run: npm run test:unit
