# Minimal birdnet.conf for CI smoke tests.
# Real installs have ~150 keys; the server reads only what it needs at boot,
# so this fixture covers the boot-essential settings only.
LATITUDE=49.5
LONGITUDE=5.5
MODEL=BirdNET_GLOBAL_6K_V2.4_Model_FP16
SECONDARY_MODEL=
DUAL_MODEL_ENABLED=0
CONFIDENCE=0.7
SENSITIVITY=1.25
SF_THRESH=0.03
DATABASE_LANG=en
RECORDING_LENGTH=15
EXTRACTION_LENGTH=6
AUDIOFMT=mp3
CHANNELS=1
TIMEZONE=UTC
SITE_NAME=CI
# Deterministic AUTH_SECRET so auth init doesn't write a fresh one back
# into the fixture on every CI run.
AUTH_SECRET=ci-fixture-secret-do-not-use-in-prod